name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Windows is excluded: PySide6 offscreen mode causes segfaults during widget
# teardown on the GitHub Actions Windows runner. The app builds and runs fine
# on Windows — the issue is specific to the headless test environment.
# Users wanting a packaged Windows build should use Briefcase locally.

jobs:
  test:
    name: Tests (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install Qt system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1-mesa-dev \
            libglib2.0-0 \
            libdbus-1-3 \
            libxkbcommon0 \
            libfontconfig1 \
            libegl1 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        # --ignore e2e: screenshot tests render and write PNG files to disk —
        # not useful in CI and they overwrite committed reference images.
        run: |
          pytest tests/ \
            --ignore=tests/test_e2e_screenshots.py \
            --tb=short -q

      - name: Report test count
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e_screenshots.py \
            --collect-only -q 2>/dev/null | tail -1
