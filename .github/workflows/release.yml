name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build
        run: briefcase build macOS
      - name: Package (ad-hoc sign)
        run: briefcase package macOS --adhoc-sign
      - name: Rename artifact
        run: find macOS -name "*.dmg" -exec mv {} openSFTP-macOS.dmg \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-macOS
          path: openSFTP-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build
        run: briefcase build windows
      - name: Package
        run: briefcase package windows
      - name: Rename artifact
        shell: bash
        run: find windows -name "*.msi" -exec mv {} openSFTP-Windows.msi \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-Windows
          path: openSFTP-Windows.msi

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build
        run: briefcase build linux appimage
      - name: Package
        run: briefcase package linux appimage
      - name: Rename artifact
        run: find linux -name "*.AppImage" -exec mv {} openSFTP-Linux.AppImage \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-Linux
          path: openSFTP-Linux.AppImage

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openSFTP-macOS.dmg
            openSFTP-Windows.msi
            openSFTP-Linux.AppImage
          generate_release_notes: true
