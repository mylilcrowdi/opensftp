name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build
        run: briefcase build macOS
      - name: Package (ad-hoc sign)
        run: briefcase package macOS --adhoc-sign
      - name: Rename artifact
        run: find dist -name "*.dmg" -exec mv {} openSFTP-macOS.dmg \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-macOS
          path: openSFTP-macOS.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build
        run: briefcase build windows
      - name: Package
        run: briefcase package windows
      - name: Rename artifact
        shell: bash
        run: find dist -name "*.msi" -exec mv {} openSFTP-Windows.msi \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-Windows
          path: openSFTP-Windows.msi

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system Qt deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 libxkbcommon0 \
            libfontconfig1 libegl1 libxcb1 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0
      - name: Install Briefcase
        run: pip install briefcase
      - name: Build (no Docker)
        run: briefcase build linux --no-docker
      - name: Package (no Docker)
        run: briefcase package linux --no-docker --adhoc-sign
      - name: Rename artifact
        run: find dist -name "*.deb" -exec mv {} openSFTP-Linux.deb \;
      - uses: actions/upload-artifact@v4
        with:
          name: openSFTP-Linux
          path: openSFTP-Linux.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            openSFTP-macOS.dmg
            openSFTP-Windows.msi
            openSFTP-Linux.deb
          generate_release_notes: true
